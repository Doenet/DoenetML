<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Coordination DOM Order</title>
        <style>
            body {
                margin: 20px;
                font-family: Arial, sans-serif;
            }
            .iframe-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(320px, 1fr));
                gap: 16px;
            }
            .iframe-wrapper {
                border: 1px solid #ccc;
                border-radius: 6px;
                padding: 8px;
                background: #fff;
            }
            iframe {
                width: 100%;
                height: 300px;
                border: 0;
            }
        </style>
    </head>
    <body>
        <h1>Parent Coordination: dom-order</h1>
        <div id="iframe-container" class="iframe-grid">
            <div class="iframe-wrapper">
                <h3>Document 1</h3>
                <iframe
                    id="frame-1"
                    src="/coordination-child.html"
                    title="Document 1"
                ></iframe>
            </div>
            <div class="iframe-wrapper">
                <h3>Document 2</h3>
                <iframe
                    id="frame-2"
                    src="/coordination-child.html"
                    title="Document 2"
                ></iframe>
            </div>
            <div class="iframe-wrapper">
                <h3>Document 3</h3>
                <iframe
                    id="frame-3"
                    src="/coordination-child.html"
                    title="Document 3"
                ></iframe>
            </div>
            <div class="iframe-wrapper">
                <h3>Document 4</h3>
                <iframe
                    id="frame-4"
                    src="/coordination-child.html"
                    title="Document 4"
                ></iframe>
            </div>
            <div class="iframe-wrapper">
                <h3>Document 5</h3>
                <iframe
                    id="frame-5"
                    src="/coordination-child.html"
                    title="Document 5"
                ></iframe>
            </div>
            <div class="iframe-wrapper">
                <h3>Document 6</h3>
                <iframe
                    id="frame-6"
                    src="/coordination-child.html"
                    title="Document 6"
                ></iframe>
            </div>
        </div>

        <script type="module">
            import {
                injectStandaloneCss,
                loadStandaloneScript,
            } from "/standaloneBlobUrls.js";

            async function main() {
                await injectStandaloneCss();
                await loadStandaloneScript();

                window.initializeDoenetParentCoordinator({
                    strategy: "dom-order",
                    timeoutMs: 30000,
                });
            }

            void main();
        </script>
    </body>
</html>
